<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chawy ERP — Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Thai', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01';
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; }
    /* Scrollbar — premium subtle */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(120,120,120,0.18); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(120,120,120,0.32); }
    /* Reset focus ring to something subtle */
    button:focus-visible, input:focus-visible {
      outline: 2px solid currentColor; outline-offset: 2px;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="common.jsx"></script>
  <script type="text/babel" src="sidebar.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="sales-orders.jsx"></script>
  <script type="text/babel" src="invoice.jsx"></script>
  <script type="text/babel" src="misc-screens.jsx"></script>
  <script type="text/babel" src="finance-screens.jsx"></script>
  <script type="text/babel" src="ops-screens.jsx"></script>
  <script type="text/babel" src="warehouse-screens.jsx"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
